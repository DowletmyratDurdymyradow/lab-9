name: iOS Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Project
        run: |
          xcodebuild \
          -project OnlineCoursesBusBooking.xcodeproj \
          -scheme OnlineCoursesBusBooking \
          -sdk iphonesimulator \
          build
